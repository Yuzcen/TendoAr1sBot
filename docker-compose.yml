services:
  # Ollama - 本地 Embedding / 推理
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama  # 使用已有的外部卷，保留已下载模型

  # Napcat - QQ 机器人
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: napcat
    restart: always
    environment:
      - WEBUI_TOKEN=${WEBUI_TOKEN}
    ports:
      - "6099:6099"
      - "13000:3000"
      - "13001:3001"
    volumes:
      - ./napcat/QQ:/app/.config/QQ
      - ./napcat/config:/app/napcat/config

  # AstrBot - AI 对话引擎
  astrbot:
    image: soulter/astrbot:latest
    container_name: astrbot
    restart: always
    ports:
      - "6185:6185"
      - "6199:6199"
    volumes:
      - ./astrbot/data:/AstrBot/data
      - bay-data:/bay-data:ro
      - ./astrbot/pip-packages/site-packages:/usr/local/lib/python3.12/site-packages
    environment:
      - BAY_DATA_DIR=/bay-data
      - NO_PROXY=localhost,127.0.0.1,ollama,bay,shipyard-bay,napcat,token-plan-cn.xiaomimimo.com,api.siliconflow.cn,api.deepseek.com,ark.cn-beijing.volces.com
      - no_proxy=localhost,127.0.0.1,ollama,bay,shipyard-bay,napcat,token-plan-cn.xiaomimimo.com,api.siliconflow.cn,api.deepseek.com,ark.cn-beijing.volces.com

  # Shipyard Bay - 管理面板
  bay:
    image: ghcr.io/astrbotdevs/shipyard-neo-bay:latest
    container_name: shipyard-bay
    restart: always
    ports:
      - "8114:8114"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./bay-config.yaml:/app/config.yaml
      - bay-data:/data
      - bay-cargos:/cargos


volumes:
  bay-data:
  bay-cargos:
  ollama_data:
    external: true
