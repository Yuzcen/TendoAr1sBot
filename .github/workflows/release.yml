name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Package configs
        run: |
          TAG="${{ steps.tag.outputs.version }}"
          mkdir -p release-pkg/TendoAr1sBot-${TAG}
          
          # 复制配置文件（排除模型、数据、敏感文件）
          rsync -av \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='napcat/QQ' \
            --exclude='astrbot/data' \
            --exclude='pip-packages' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            ./ release-pkg/TendoAr1sBot-${TAG}/
          
          cd release-pkg
          tar czf ../TendoAr1sBot-${TAG}.tar.gz TendoAr1sBot-${TAG}/
          cd ..
          sha256sum TendoAr1sBot-${TAG}.tar.gz > TendoAr1sBot-${TAG}.tar.gz.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: TendoAr1sBot ${{ steps.tag.outputs.version }}
          generate_release_notes: true
          files: |
            TendoAr1sBot-${{ steps.tag.outputs.version }}.tar.gz
            TendoAr1sBot-${{ steps.tag.outputs.version }}.tar.gz.sha256
